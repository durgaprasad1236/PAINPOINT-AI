<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PainPoint AI — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@300;400;500;600;700;800;900&family=Outfit:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    /* ═══════════════════════════════════════════════════════════════
       GLASSMORPHISM LOGIN PAGE — Premium Enterprise Theme
    ═══════════════════════════════════════════════════════════════ */

    :root {
      --glass-bg: rgba(20, 25, 45, 0.4);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --accent-primary: #00d9ff;
      --accent-secondary: #7c3aed;
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --text-muted: rgba(255, 255, 255, 0.4);
      --error: #ff6b6b;
      --success: #51cf66;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Animated background particles */
    .particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--accent-primary);
      border-radius: 50%;
      opacity: 0.3;
      animation: float linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      50% { opacity: 0.5; }
      100% { transform: translateY(-100vh) scale(1); opacity: 0; }
    }

    /* Glass card container */
    .login-container {
      position: relative;
      z-index: 10;
      width: 90%;
      max-width: 440px;
      padding: 50px 45px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: var(--glass-shadow);
      animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Logo */
    .logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 217, 255, 0.7); }
      50% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(0, 217, 255, 0); }
    }

    .logo-text {
      font-family: 'Darker Grotesque', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.03em;
    }

    .logo-ai {
      color: var(--accent-primary);
      font-style: italic;
    }

    .logo-subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
      font-weight: 300;
      margin-top: 6px;
    }

    /* Form */
    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }

    .input-wrapper {
      position: relative;
    }

    .form-input {
      width: 100%;
      padding: 14px 18px 14px 48px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 0.95rem;
      font-family: 'Outfit', sans-serif;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-input:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 4px rgba(0, 217, 255, 0.15);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    /* Checkbox */
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
    }

    .checkbox-input {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--accent-primary);
    }

    .checkbox-label {
      font-size: 0.875rem;
      color: var(--text-secondary);
      cursor: pointer;
    }

    /* Button */
    .btn-primary {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      color: white;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(0, 217, 255, 0.3);
      letter-spacing: 0.02em;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 217, 255, 0.5);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Loading spinner */
    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      display: inline-block;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Links */
    .link {
      color: var(--accent-primary);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .link:hover {
      color: var(--accent-secondary);
    }

    /* Footer text */
    .footer-text {
      text-align: center;
      margin-top: 28px;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    /* Error message */
    .error-box {
      padding: 12px 16px;
      background: rgba(255, 107, 107, 0.15);
      border: 1px solid rgba(255, 107, 107, 0.3);
      border-radius: 10px;
      color: var(--error);
      font-size: 0.875rem;
      margin-bottom: 20px;
      display: none;
      animation: shake 0.5s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .error-box.show {
      display: block;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 28px 0;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }

    .divider span {
      padding: 0 14px;
    }

    /* OAuth buttons */
    .btn-oauth {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .btn-oauth:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--accent-primary);
    }

    /* Hidden class */
    .hidden {
      display: none;
    }
  </style>
</head>
<body>

  <!-- Animated particles -->
  <div class="particles" id="particles"></div>

  <!-- Login Container -->
  <div class="login-container">
    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
          <path d="M2 17l10 5 10-5" stroke="white" stroke-width="2" stroke-linejoin="round"/>
          <path d="M2 12l10 5 10-5" stroke="white" stroke-width="2" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1 class="logo-text">PainPoint<span class="logo-ai">AI</span></h1>
      <p class="logo-subtitle">Product Intelligence Platform</p>
    </div>

    <!-- Error message -->
    <div class="error-box" id="errorBox">
      <span id="errorMsg">Invalid credentials. Please try again.</span>
    </div>

    <!-- Login Form -->
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="currentColor" stroke-width="2"/>
              <polyline points="22,6 12,13 2,6" stroke="currentColor" stroke-width="2"/>
            </svg>
          </span>
          <input 
            type="email" 
            id="email" 
            class="form-input" 
            placeholder="you@company.com"
            required
            autocomplete="email"
          />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="2"/>
            </svg>
          </span>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          />
        </div>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="remember" class="checkbox-input" />
        <label for="remember" class="checkbox-label">Remember me for 30 days</label>
      </div>

      <button type="submit" class="btn-primary" id="loginBtn">
        <span id="btnText">Sign In to Platform</span>
        <span id="btnLoading" class="hidden"><span class="spinner"></span></span>
      </button>

      <div class="footer-text">
        Forgot password? <a href="#" class="link" id="resetLink">Reset here</a>
      </div>
    </form>

    <div class="divider"><span>or continue with</span></div>

    <button class="btn-oauth" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#EA4335" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#4285F4" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#34A853" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>

    <button class="btn-oauth" id="githubBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
      Sign in with GitHub
    </button>

  </div>

  <script src="config.js"></script>
  <script>
    // Generate floating particles
    const particlesEl = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
      particle.style.animationDelay = Math.random() * 5 + 's';
      particlesEl.appendChild(particle);
    }

    // Form handling
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const btnText = document.getElementById('btnText');
    const btnLoading = document.getElementById('btnLoading');
    const errorBox = document.getElementById('errorBox');

    function normalizeApiBase(url) {
      return (url || '').trim().replace(/\/$/, '');
    }

    function resolveApiUrl() {
      const saved = normalizeApiBase(localStorage.getItem('backendUrlInput') || '');
      const configured = normalizeApiBase(window.APP_CONFIG?.API_BASE_URL || 'https://painpoint-backend.onrender.com');
      const selected = saved || configured;

      if (window.location.protocol === 'https:' && selected.startsWith('http://')) {
        return selected.replace(/^http:\/\//i, 'https://');
      }

      return selected;
    }

    // API base URL
    const API_URL = resolveApiUrl();

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;

      errorBox.classList.remove('show');
      loginBtn.disabled = true;
      btnText.classList.add('hidden');
      btnLoading.classList.remove('hidden');

      try {
        // Call backend authentication endpoint
        const response = await fetch(API_URL + '/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          // Success - store auth token
          localStorage.setItem('authToken', data.token);
          if (remember) {
            localStorage.setItem('rememberMe', 'true');
          }
          
          // Redirect to dashboard
          window.location.href = 'dashboard.html';
        } else {
          // Error
          errorBox.classList.add('show');
          document.getElementById('errorMsg').textContent =
            data.detail || data.message || 'Invalid credentials';
          loginBtn.disabled = false;
          btnText.classList.remove('hidden');
          btnLoading.classList.add('hidden');
        }
      } catch (error) {
        errorBox.classList.add('show');
        document.getElementById('errorMsg').textContent =
          'Backend unavailable. Please try again in a few moments.';
        loginBtn.disabled = false;
        btnText.classList.remove('hidden');
        btnLoading.classList.add('hidden');
      }
    });

    // OAuth buttons (demo only)
    document.getElementById('googleBtn').addEventListener('click', () => {
      const googleClientId = window.APP_CONFIG?.GOOGLE_CLIENT_ID || '';
      if (!googleClientId || !window.google?.accounts?.id) {
        errorBox.classList.add('show');
        document.getElementById('errorMsg').textContent = 'Google sign-in is not enabled.';
        return;
      }

      // Trigger Google Sign-In
      google.accounts.id.renderButton(
        document.getElementById('googlebtn'),
        { theme: 'outline', size: 'large' }
      );
      document.getElementById('googlebtn').querySelector('div[role="button"]')?.click();
    });

    // Initialize Google Sign-In
    function initGoogleSignIn() {
      const googleClientId = window.APP_CONFIG?.GOOGLE_CLIENT_ID || '';
      if (!googleClientId) {
        return;
      }

      google.accounts.id.initialize({
        client_id: googleClientId,
        callback: handleGoogleSignIn,
        ux_mode: 'popup'
      });
    }

    function handleGoogleSignIn(response) {
      if (response.credential) {
        loginBtn.disabled = true;
        btnText.classList.add('hidden');
        btnLoading.classList.remove('hidden');
        errorBox.classList.remove('show');

        // Send token to backend for verification
        fetch(API_URL + '/api/verify-google-token', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            token: response.credential
          })
        })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            localStorage.setItem('authToken', data.token);
            window.location.href = 'dashboard.html';
          } else {
            errorBox.classList.add('show');
            document.getElementById('errorMsg').textContent = data.message || 'Google sign-in failed';
            loginBtn.disabled = false;
            btnText.classList.remove('hidden');
            btnLoading.classList.add('hidden');
          }
        })
        .catch(err => {
          errorBox.classList.add('show');
          document.getElementById('errorMsg').textContent = 'Sign-in error: ' + err.message;
          loginBtn.disabled = false;
          btnText.classList.remove('hidden');
          btnLoading.classList.add('hidden');
        });
      }
    }

    // Initialize Google Sign-In when page loads
    window.addEventListener('load', initGoogleSignIn);

    document.getElementById('githubBtn').addEventListener('click', () => {
      errorBox.classList.add('show');
      document.getElementById('errorMsg').textContent = 'GitHub OAuth integration is not enabled.';
    });

    document.getElementById('resetLink').addEventListener('click', (e) => {
      e.preventDefault();
      errorBox.classList.add('show');
      document.getElementById('errorMsg').textContent = 'Password reset is not enabled.';
    });

    // Check if already logged in
    if (localStorage.getItem('authToken')) {
      window.location.href = 'dashboard.html';
    }
  </script>

</body>
</html>
