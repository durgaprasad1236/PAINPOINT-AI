services:
  - type: web
    name: painpoint-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: ENV
        value: production
      - key: API_KEY
        sync: false
      - key: AUTH_EMAIL
        sync: false
      - key: AUTH_PASSWORD
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ORIGIN_REGEX
        sync: false
